<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Caméra + Orientation</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #0f0;
      font-family: sans-serif;
      overflow: hidden;
    }

    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* effet miroir pour la caméra frontale */
    }

    canvas#overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #angles {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.5);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 18px;
      text-align: center;
      color: #0f0;
      z-index: 10;
    }

    #photo-result {
      position: absolute;
      bottom: 10px;
      right: 10px;
      width: 120px;
      height: 90px;
      border: 2px solid #0f0;
      background: #111;
      object-fit: cover;
      z-index: 10;
    }

    #btn-orientation-permission {
      position: absolute;
      bottom: 10px;
      left: 10px;
      z-index: 10;
      padding: 8px 12px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="container">
    <video id="video" autoplay playsinline></video>
    <canvas id="overlay"></canvas>
    <div id="angles">
      β (avant/arrière) : <span id="beta">0</span>°<br/>
      γ (gauche/droite) : <span id="gamma">0</span>°<br/>
      azimut (α) : <span id="alpha">0</span>°
    </div>
    <img id="photo-result" alt="Dernière photo" />
    <button id="btn-orientation-permission" style="display:none;">
      Activer l’orientation
    </button>
  </div>

  <script>
    const video = document.getElementById('video');
    const overlay = document.getElementById('overlay');
    const ctx = overlay.getContext('2d');
    const betaSpan = document.getElementById('beta');
    const gammaSpan = document.getElementById('gamma');
    const alphaSpan = document.getElementById('alpha');
    const photoImg = document.getElementById('photo-result');
    const btnOrientation = document.getElementById('btn-orientation-permission');

    let lastShotTime = 0;
    const SHOT_COOLDOWN = 3000; // ms
    const HORIZON_TOLERANCE = 3; // degrés pour considérer l’inclinaison “nulle”

    // --- 1. Démarrage de la caméra frontale ---
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: 'user' // caméra frontale
          },
          audio: false
        });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
          resizeOverlay();
          drawReticle();
        };
      } catch (err) {
        console.error('Erreur caméra :', err);
        alert('Impossible d’accéder à la caméra : ' + err.message);
      }
    }

    function resizeOverlay() {
      overlay.width = video.videoWidth || overlay.clientWidth;
      overlay.height = video.videoHeight || overlay.clientHeight;
    }

    // --- 2. Dessiner la mire au centre ---
    function drawReticle() {
      const w = overlay.width;
      const h = overlay.height;
      ctx.clearRect(0, 0, w, h);

      const cx = w / 2;
      const cy = h / 2;
      const size = Math.min(w, h) * 0.05;

      ctx.strokeStyle = 'rgba(0, 255, 0, 0.8)';
      ctx.lineWidth = 2;

      // croix
      ctx.beginPath();
      ctx.moveTo(cx - size, cy);
      ctx.lineTo(cx + size, cy);
      ctx.moveTo(cx, cy - size);
      ctx.lineTo(cx, cy + size);
      ctx.stroke();

      // cercle
      ctx.beginPath();
      ctx.arc(cx, cy, size * 1.4, 0, Math.PI * 2);
      ctx.stroke();

      requestAnimationFrame(drawReticle);
    }

    // --- 3. Gestion de l’orientation du téléphone ---
    function handleOrientation(event) {
      const alpha = event.alpha; // azimut approx.
      const beta = event.beta;   // inclinaison avant/arrière
      const gamma = event.gamma; // inclinaison gauche/droite

      if (alpha == null || beta == null || gamma == null) return;

      betaSpan.textContent = beta.toFixed(1);
      gammaSpan.textContent = gamma.toFixed(1);
      alphaSpan.textContent = alpha.toFixed(1);

      // On considère “horizontal” quand beta et gamma sont proches de 0
      const isHorizontal =
        Math.abs(beta) <= HORIZON_TOLERANCE &&
        Math.abs(gamma) <= HORIZON_TOLERANCE;

      const now = Date.now();
      if (isHorizontal && now - lastShotTime > SHOT_COOLDOWN) {
        takePhoto();
        lastShotTime = now;
      }
    }

    function setupOrientation() {
      if (typeof DeviceOrientationEvent === 'undefined') return;

      // iOS 13+ nécessite une permission explicite
      if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        btnOrientation.style.display = 'block';
        btnOrientation.addEventListener('click', async () => {
          try {
            const response = await DeviceOrientationEvent.requestPermission();
            if (response === 'granted') {
              window.addEventListener('deviceorientation', handleOrientation, true);
              btnOrientation.style.display = 'none';
            } else {
              alert('Permission orientation refusée');
            }
          } catch (e) {
            console.error(e);
          }
        });
      } else {
        // Android / navigateurs qui n’exigent pas de permission explicite
        window.addEventListener('deviceorientation', handleOrientation, true);
      }
    }

    // --- 4. Prendre une photo quand le téléphone est horizontal ---
    function takePhoto() {
      if (!video.videoWidth || !video.videoHeight) return;

      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const cctx = canvas.getContext('2d');

      // miroir horizontal pour correspondre à la prévisualisation
      cctx.translate(canvas.width, 0);
      cctx.scale(-1, 1);

      cctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
      photoImg.src = dataUrl;
    }

    // --- Initialisation ---
    window.addEventListener('load', () => {
      startCamera();
      setupOrientation();
    });

    window.addEventListener('resize', resizeOverlay);
  </script>
</body>
</html>
