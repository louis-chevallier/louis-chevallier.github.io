<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Caméra + Orientation</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #0f0;
      font-family: sans-serif;
      overflow: hidden;
    }

    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* effet miroir pour la caméra frontale */
    }

    canvas#overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #angles {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.5);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 18px;
      text-align: center;
      color: #0f0;
      z-index: 10;
    }

    #plus {
      position: absolute;
      top: 10px;
      left: 20px;
      background: rgba(0,0,0,0.5);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 18px;
      text-align: center;
      color: #0f0;
      z-index: 10;
    }
    #moins {
      position: absolute;
      top: 50px;
      left: 20px;
      background: rgba(0,0,0,0.5);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 18px;
      text-align: center;
      color: #0f0;
      z-index: 10;
    }

    #photo-result {
      position: absolute;
      bottom: 10px;
      left: 10px;
      width: 400px;
      height: 400px;
      border: 2px solid #0f0;
      background: #111;
      object-fit: cover;
      z-index: 10;
    }

    #btn-orientation-permission {
      position: absolute;
      bottom: 10px;
      left: 10px;
      z-index: 10;
      padding: 8px 12px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  V4
  <div id="container">
    <video id="video" autoplay playsinline></video>
    <canvas id="overlay"></canvas>
    <div id="angles">
      V correction
      β (avant/arrière) : <span id="beta">0</span>°<br/>
      γ (gauche/droite) : <span id="gamma">0</span>°<br/>
      azimut (α) : <span id="alpha">0</span>°
    </div>
    <div id="plus"> + </div>
    <div id="moins"> - </div>
    <img id="photo-result" alt="Dernière photo" />
    <button id="btn-orientation-permission" style="display:none;">
      Activer l’orientation
    </button>
  </div>
  <script type="module" src='code2.js'>    </script>


</body>
</html>
