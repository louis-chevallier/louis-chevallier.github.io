<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Détecteur Cercles Caméra Frontale</title>
    <style>
        body { 
            margin: 0; padding: 10px; 
            font-family: Arial, sans-serif; 
            background: #000; 
            color: white; 
            overflow: hidden;
        }
        #container {
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            max-width: 100%; 
            max-height: 100%;
        }
        #canvas { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
            border-radius: 10px;
        }
        #info {
            position: absolute; 
            top: 10px; 
            left: 10px; 
            background: rgba(0,0,0,0.7); 
            padding: 10px; 
            border-radius: 5px;
            font-size: 14px;
        }
        button {
            position: absolute; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%);
            padding: 15px 30px; 
            font-size: 16px; 
            background: #4CAF50; 
            color: white; 
            border: none; 
            border-radius: 25px; 
            cursor: pointer;
        }
        button:hover { background: #45a049; }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="canvas"></canvas>
        <div id="info">
            Cercles détectés: <span id="circleCount">0</span><br>
            FPS: <span id="fps">0</span>
        </div>
        <button onclick="toggleCamera()">Démarrer Caméra</button>
    </div>

    <script>
        class CircleDetector {
            constructor() {
                this.canvas = document.getElementById('canvas');
                this.ctx = this.canvas.getContext('2d');
                this.gl = null;
                this.video = document.createElement('video');
                this.video.playsInline = true;
                this.video.muted = true;
                
                this.isRunning = false;
                this.animationId = null;
                this.lastTime = 0;
                this.frameCount = 0;
                this.fps = 0;
                
                this.initWebGL();
                this.setupEventListeners();
                this.resizeCanvas();
            }

            initWebGL() {
                // Canvas 2D pour simplicité et performance mobile
                // WebGL possible mais plus complexe pour ce cas d'usage
                this.tempCanvas = document.createElement('canvas');
                this.tempCtx = this.tempCanvas.getContext('2d');
            }

            async initCamera() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: 'user',
                            width: { ideal: 640 },
                            height: { ideal: 480 }
                        }
                    });
                    this.video.srcObject = stream;
                    await this.video.play();
                    this.startDetection();
                } catch (err) {
                    alert('Erreur caméra: ' + err.message);
                }
            }

            setupEventListeners() {
                window.addEventListener('resize', () => this.resizeCanvas());
            }

            resizeCanvas() {
                const rect = document.getElementById('container').getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;
                this.tempCanvas.width = 320;  // Downscale pour détection rapide
                this.tempCanvas.height = 240;
            }

            houghCircleTransform(imageData) {
                const width = imageData.width;
                const height = imageData.height;
                const data = imageData.data;
                
                // Convertir en gris et seuiller
                const gray = new Uint8Array(width * height);
                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i], g = data[i+1], b = data[i+2];
                    const grayVal = (0.299*r + 0.587*g + 0.114*b) | 0;
                    gray[i/4] = grayVal > 100 ? 255 : 0; // Seuillage fort pour contours nets
                }

                // Accumulateur Hough 3D (r, cx, cy)
                const maxRadius = 50;
                const accumulator = new Float32Array(maxRadius * width * height);
                const voteThreshold = 20;

                // Voter pour les centres potentiels
                for (let y = 1; y < height-1; y++) {
                    for (let x = 1; x < width-1; x++) {
                        const i = y * width + x;
                        if (gray[i] === 255) {
                            // Vérifier 8 voisins pour contour robuste
                            const neighbors = [
                                gray[(y-1)*width + x-1], gray[(y-1)*width + x], gray[(y-1)*width + x+1],
                                gray[y*width + x-1],                          gray[y*width + x+1],
                                gray[(y+1)*width + x-1], gray[(y+1)*width + x], gray[(y+1)*width + x+1]
                            ];
                            const edgeScore = neighbors.reduce((a,b)=>a+b,0) / 8;
                            
                            if (edgeScore > 128) {
                                for (let r = 10; r < maxRadius; r++) {
                                    const cx = x;
                                    const cy = y;
                                    if (cx >= r && cx < width-r && cy >= r && cy < height-r) {
                                        const accIndex = ((r-10) * width * height) + (cy * width) + cx;
                                        accumulator[accIndex] += edgeScore / 255;
                                    }
                                }
                            }
                        }
                    }
                }

                // Trouver les maxima locaux
                const circles = [];
                const visited = new Set();
                
                for (let r = 10; r < maxRadius; r++) {
                    for (let cy = r; cy < height-r; cy++) {
                        for (let cx = r; cx < width-r; cx++) {
                            const accIndex = ((r-10) * width * height) + (cy * width) + cx;
                            const votes = accumulator[accIndex];
                            
                            if (votes > voteThreshold && !visited.has(accIndex)) {
                                circles.push({x: cx, y: cy, r: r, votes});
                                // Marquer zone visitée
                                for (let dy = -r; dy <= r; dy++) {
                                    for (let dx = -r; dx <= r; dx++) {
                                        const nx = cx + dx, ny = cy + dy;
                                        if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                                            const nIndex = ((r-10) * width * height) + (ny * width) + nx;
                                            visited.add(nIndex);
                                        }
                                    }
                                }
                            }
                        }
                    }
                }

                return circles.slice(0, 10); // Top 10 cercles
            }

            detectAndDraw() {
                if (!this.video.videoWidth) return;

                // Redimensionner et copier vidéo
                this.tempCtx.drawImage(this.video, 0, 0, this.tempCanvas.width, this.tempCanvas.height);
                const imageData = this.tempCtx.getImageData(0, 0, this.tempCanvas.width, this.tempCanvas.height);
                
                // Détection cercles
                const circles = this.houghCircleTransform(imageData);
                
                // Dessiner vidéo + cercles
                this.ctx.save();
                this.ctx.drawImage(this.video, 0, 0, this.canvas.width, this.canvas.height);
                
                // Dessiner cercles avec scale
                const scaleX = this.canvas.width / this.tempCanvas.width;
                const scaleY = this.canvas.height / this.tempCanvas.height;
                
                circles.forEach(circle => {
                    const x = circle.x * scaleX;
                    const y = circle.y * scaleY;
                    const r = circle.r * scaleX;
                    
                    // Contour cercle
                    this.ctx.strokeStyle = '#FF0000';
                    this.ctx.lineWidth = 3;
                    this.ctx.beginPath();
                    this.ctx.arc(x, y, r, 0, Math.PI * 2);
                    this.ctx.stroke();
                    
                    // Centre
                    this.ctx.fillStyle = '#FFFF00';
                    this.ctx.beginPath();
                    this.ctx.arc(x, y, 6, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    // Rayons indicateurs
                    this.ctx.strokeStyle = '#FFFF00';
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    this.ctx.moveTo(x, y - r);
                    this.ctx.lineTo(x, y);
                    this.ctx.moveTo(x + r, y);
                    this.ctx.lineTo(x, y);
                    this.ctx.stroke();
                });
                
                this.ctx.restore();

                // Stats
                document.getElementById('circleCount').textContent = circles.length;
                
                this.frameCount++;
                const now = performance.now();
                if (now - this.lastTime >= 1000) {
                    this.fps = Math.round(this.frameCount * 1000 / (now - this.lastTime));
                    document.getElementById('fps').textContent = this.fps;
                    this.frameCount = 0;
                    this.lastTime = now;
                }
            }

            startDetection() {
                this.isRunning = true;
                this.animate();
            }

            stopDetection() {
                this.isRunning = false;
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                }
                if (this.video.srcObject) {
                    this.video.srcObject.getTracks().forEach(track => track.stop());
                }
            }

            animate() {
                if (!this.isRunning) return;
                
                this.detectAndDraw();
                this.animationId = requestAnimationFrame(() => this.animate());
            }
        }

        // Instance globale
        let detector;
        let cameraActive = false;

        function toggleCamera() {
            if (!cameraActive) {
                detector = new CircleDetector();
                detector.initCamera();
                cameraActive = true;
                document.querySelector('button').textContent = 'Arrêter Caméra';
            } else {
                detector.stopDetection();
                cameraActive = false;
                document.querySelector('button').textContent = 'Démarrer Caméra';
            }
        }
    </script>
</body>
</html>
