<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Caméra + Orientation</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #0f0;
      font-family: sans-serif;
      overflow: hidden;
    }

    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* effet miroir pour la caméra frontale */
    }

    canvas#overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #angles {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.5);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 18px;
      text-align: center;
      color: #0f0;
      z-index: 10;
    }

    #plus {
      position: absolute;
      top: 10px;
      left: 20px;
      background: rgba(0,0,0,0.5);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 58px;
      text-align: center;
      color: #0f0;
      z-index: 10;
    }
    #moins {
      position: absolute;
      top: 100px;
      left: 20px;
      background: rgba(0,0,0,0.5);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 58px;
      text-align: center;
      color: #0f0;
      z-index: 10;
    }

    #photo-result {
      position: absolute;
      bottom: 10px;
      left: 10px;
      width: 400px;
      height: 400px;
      border: 2px solid #0f0;
      background: #111;
      object-fit: cover;
      z-index: 10;
    }

    #btn-orientation-permission {
      position: absolute;
      bottom: 10px;
      left: 10px;
      z-index: 10;
      padding: 8px 12px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="texte">
  </div>
  <div id="container">
    <form class="form-container"> 
      <label class="form-label" for="name">All devices </label> 
      <input class="form-input" type="checkbox" placeholder="trace name"  id="all_devices" name="all devices" > </input>
    </form>
    <input id="Start" type="button" value="start">
    
  </div>
  <script type="module" src='code2.js'>    </script>


</body>
</html>
